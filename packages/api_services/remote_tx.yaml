api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: send_rf_rc_switch_raw
      variables:
        protocol_number: int
        raw_data: string
      then:
        - remote_transmitter.transmit_rc_switch_raw:
            transmitter_id: RF_TX
            protocol: !lambda 'return esphome::remote_base::RC_SWITCH_PROTOCOLS[protocol_number];'
            code: !lambda 'return raw_data;'
    - action: send_ir_raw
      variables:
        command: int[]
      then:
        - remote_transmitter.transmit_raw:
            transmitter_id: IR_TX
            code: !lambda |-
              std::vector<int32_t> out;
              out.reserve(command.size());
              for (auto v : command) out.push_back((int32_t)v);
              return out;
    - action: send_rf_raw
      variables:
        command: int[]
      then:
        - remote_transmitter.transmit_raw:
            transmitter_id: RF_TX
            carrier_frequency: 0Hz
            code: !lambda |-
              std::vector<int32_t> out;
              out.reserve(command.size());
              for (auto v : command) out.push_back((int32_t)v);
              return out;
